syntax = "proto3";

package ner;

service NERService {
  rpc ExtractEntities (NERRequest) returns (NERResponse);
}

message NERRequest {
  string text = 1;
}

message Entity {
  string text = 1;
  string label = 2;
  int32 start = 3;
  int32 end = 4;
}

message NERResponse {
  repeated Entity entities = 1;
}